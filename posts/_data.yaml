type: post
layout: post.tsx
transformImages:
  - resize: [900]
    matches: cover
    suffix: -big
    format: webp

  - resize: [225]
    matches: cover
    suffix: -small
    format: webp

  - resize: [900]
    format: [webp, png, jpg, gif]

metas:
  site: vraton's site
  fediverse: "@v_raton@fosstodon.org"
  lang: pt-BR
  generator: true
  title: "=title || $ h1"
  description: "=description"
  image: "$ img.high.cover attr(src)"
  keywords: "=tags"
  color: "black"
